services:
  - type: web
    name: enpara-bot
    runtime: python
    buildCommand: "pip install -r requirements.txt && apt-get update && apt-get install -y chromium-browser chromium-chromedriver"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
        
